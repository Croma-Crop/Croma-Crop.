<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles/global.css">
    <link rel="stylesheet" href="/styles/login.css">
    <title>Iniciar Sesión</title>
    <script src="/script/script.js" defer></script>
    <script src="/script/login.js" defer></script>
</head>

<body>

    <header>
        <a href="login.html">
            <img src="/img/removebg-preview.png" alt="Logo Croma Corp" id="logo">
        </a>
        <h1 id="titulo">Iniciar Sesión</h1>
        <nav>
        <a href="index.html">Inicio</a>
        <a href="#">Formulario</a>
        <a href="#">Prestamos</a>
      </nav>
    </header>

    <main>
        <section id="newsletter">
            <form id="formularioNewsletter">
                <h1>Datos personales</h1>

                <div id="campo-documento">
                    <label for="cedula">Cedula</label>
                    <input type="text" id="cedula" name="cedula" placeholder="Ingresá tu cedula" required>
                    <p id="mensaje" class="mensaje-error"></p>
                </div>
                

                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Ingresá una contraseña" required>
                <p id="seguridad" class="mensaje-error"></p>

                <button type="submit" id="crear">Crear cuenta</button>
                <div id="campo-boton">
                <button id="extranjero">Si sos extranjero clickea aca</button>
                </div>
            </form>
        </section>
    </main>

    <footer>
        <section class="footer-bottom">
            <p>&copy; 2026 Croma Corp. Todos los derechos reservados.</p>
            <p>ITI - DGTEP</p>
        </section>
    </footer>


</body>

</html>
