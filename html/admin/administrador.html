<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrador</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/styles/global.css">
  <link rel="stylesheet" href="/styles/admin.css">
    <script src="/script/script.js" defer></script>
    <script src="/script/admin.js" defer></script>
   
</head>
<body>
    <header>
        <a href="login.html">
            <img src="/img/removebg-preview.png" alt="Logo Croma Corp" id="logo">
        </a>
        <div class="dropdown">
            <img src="/img/menu.png" alt="burguer" id="burguer" data-bs-toggle="dropdown" aria-expanded="false" style="cursor:pointer">
            <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="/html/admin/index_admin.html">Inicio</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item" href="/html/tickets.html">Tickets</a></li>
                <li><a class="dropdown-item" href="/html/incidenciascreadas.html">Incidencias Creadas</a></li>
                <li><a class="dropdown-item" href="/html/inventario.html">Inventario</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item" href="/html/admin/administrador.html">Administrador</a></li>
            </ul>
        </div>

        <h1 id="titulo">Administrador</h1>
    </header>
    <main>
         <section class="seccionTablaEmpleados">
            <header class="cajaEncabezado">
                <h2>Datos de empleados</h2>
                <button type="button" class="btnOperacion" id="btnAltaEmpleado">Alta Empleado</button>
            </header>
            
            <table>
                <caption>Listado de empleados registrados</caption>
                <thead>
                    <tr>
                        <th>Documento</th>
                        <th>Nombre</th>
                        <th>Apellido</th>
                        <th>Rol</th>
                        <th>Contraseña</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTablaEmpleados">
                </tbody>
            </table>
        </section>
               <dialog id="dialog" class="dialogGestionarEmpleado seccionFormulario">
            <button class="btnCerrarGestionarEmpleado" id="btnCerrarGestionarEmpleado" type="button">
                <img src="/img/x.svg" alt="Cerrar Menú" class="iconoMenu">
            </button>
            <form action="administrador.html" method="post" id="formularioGestionarEmpleado">
                <fieldset id="fieldset">
                    <legend>Gestión de empleado</legend>

                    <fieldset>
                        <legend>Datos del empleado</legend>

                        <div id="contenedor-documento-admin">
                            <div class="cajaEntradaDeDatos">
                                <label for="cedula">Cédula</label>
                                <input type="text" id="cedula" name="cedula" placeholder="Ingrese la cédula"
                                    autocomplete="off" pattern="[1-9][0-9]{7}"
                                    title="Ingrese exactamente 8 dígitos sin puntos ni guiones" inputmode="numeric"
                                    maxlength="8" required>
                            </div>
                        </div>
                        <div id="campo-boton-admin">
                            <button type="button" id="btnExtranjeroAdmin">Empleado extranjero</button>
                        </div>

                        <div class="cajaEntradaDeDatos">
                            <label for="nombre">Nombre</label>
                            <input type="text" id="nombre" name="nombre" placeholder="Ingrese el nombre"
                                autocomplete="given-name" required>
                        </div>

                        <div class="cajaEntradaDeDatos">
                            <label for="apellido">Apellido</label>
                            <input type="text" id="apellido" name="apellido" placeholder="Ingrese el apellido"
                                autocomplete="family-name" required>
                        </div>

                        <div class="cajaEntradaDeDatos">
                            <label for="rol">Rol</label>
                            <select name="rol" id="rol" required>
                                <option value="" disabled selected>Seleccione un rol</option>
                                <option value="direccion">Dirección</option>
                                <option value="docente">Docente</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>

                        <div class="cajaEntradaDeDatos">
                            <label for="contrasena">Contraseña</label>
                            <input type="password" id="contrasena" name="contrasena" placeholder="Ingrese una contraseña" required>
                        </div>
                    </fieldset>

                    <button type="submit">Guardar empleado</button>
                </fieldset>
            </form>
        </dialog>
    </main>
    <footer>
        <section class="footer-bottom">
            <p>&copy; 2026 Croma Corp. Todos los derechos reservados.</p>
            <p>ITI - DGTEP</p>
        </section>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
