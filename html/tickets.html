<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles/global.css">
    <link rel="stylesheet" href="/styles/tickets.css">
    <title>Tickets</title>
    <script src="/script/tickets.js" defer></script>
    <script src="/script/script.js" defer></script>
</head>

<body>

    <header>
        <a href="login.html">
            <img src="/img/removebg-preview.png" alt="Logo Croma Corp" id="logo">
        </a>
        <img src="/img/menu.png" alt="burguer" id="burguer">

        <h1 id="titulo">Incidencias y Solicitudes</h1>
        <nav>
        <a href="index.html">Inicio</a>
        <a href="/html/tickets.html">Tickets</a>
        <a href="/html/login.html">Ingresa</a>
        <a href="incidenciascreadas.html">Incidencias</a>

    </nav>
    </header>

    <main>
        <section id="newsletter">
            <form id="formularioNewsletter">
                <p id="paragraph"><strong>¿Que quiere registrar?</strong></p>

                <div id="campo-documento">
                    <button type="button" id="incidencia">Incidencia</button>
                    <button type="button" id="regSolicitud">Solicitudes</button>
                </div>
            </form>
        </section>
        <section class="contenedor">
        <form id="incforms">
            <h3>Incidencias</h3>

            <label for="fecha">Fecha</label>
            <input id="fecha" type="date" name="fecha">

            <label for="salon">Salon:</label>
            <input id="salon" type="text" name="salon" placeholder="Ej:L3">

            <p>Turno:</p>
            <section class="radio-grupo">
            <input type="radio" id="matutino" name="turno" value="Matutino">
            <label for="matutino">Matutino</label>

            <input type="radio" id="vespertino" name="turno" value="Vespertino">
            <label for="vespertino">Vespertino</label>

            <input type="radio" id="nocturno" name="turno" value="Nocturno">
            <label for="nocturno">Nocturno</label>
            </section>

            <p>Tipo de incidencia</p>
            <select id="tipo" name="tipo" required>
                <option value="">---Seleccionar---</option>
                <option value="">Computadora</option>
                <option value="">Televisor</option>
                <option value="">Periferico</option>
                <option value="">Otro</option>
            </select>
            <p>¿Cual es la incidencia?</p>
            <input id="descripcioninc" name="incInput">
            <button id="enviarinc">Enviar Incidencia</button>
            
        </form>
        </section>
    </main>

    <footer>
        <section class="footer-bottom">
            <p>&copy; 2026 Croma Corp. Todos los derechos reservados.</p>
            <p>ITI - DGTEP</p>
        </section>
    </footer>


</body>

</html>
