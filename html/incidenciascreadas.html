<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incidencias Creadas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/styles/global.css">
    <link rel="stylesheet" href="/styles/incidencias.css">
    <script src="/script/permisos.js" defer></script>
    <script src="/script/script.js" defer></script>
    <script src="/script/incidencias.js" defer></script>
   
</head>
<body data-modulo="incidencias">
    <header>
        <a href="incidenciascreadas.html">
            <img src="/img/removebg-preview.png" alt="Logo Croma Corp" id="logo">
        </a>
        <div class="dropdown">
            <img src="/img/menu.png" alt="burguer" id="burguer" data-bs-toggle="dropdown" aria-expanded="false" style="cursor:pointer">
            <ul class="dropdown-menu"></ul>
        </div>

        <h1 id="titulo">Incidencias creadas</h1>

    </header>
    <main>
        <section id="seccion-listado">
            <h3 class="titulo-seccion">Incidencias Registradas</h3>
            <div id="controles">
                <input id="inptbusqueda" name="inptbusqueda" placeholder="Buscar por profesor, tipo, salón, serie...">
                <div id="filtros">
                    <button type="button" class="filtro-clase activo" data-clase="Todos">Todos</button>
                    <button type="button" class="filtro-clase" data-clase="Incidencia">Incidencias</button>
                    <button type="button" class="filtro-clase" data-clase="Solicitud">Solicitudes</button>
                </div>
            </div>
            <ul id="listado-tickets"></ul>
        </section>
    </main>
    <footer>
        <section class="footer-bottom">
            <p>&copy; 2026 Croma Corp. Todos los derechos reservados.</p>
            <p>ITI - DGTEP</p>
        </section>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
